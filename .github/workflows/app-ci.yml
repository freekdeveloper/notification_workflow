name: Notification Example App CI

on:
    push:
        branches:
            [master, develop]
    pull_request:
    workflow_dispatch:

env:
    # Keep in sync with .fvmrc — see README "Flutter version (FVM)".
    FLUTTER_VERSION: "3.41.9"

jobs:
    static_checks:
        name: Static checks
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v6
            - name: Flutter install stable version
              uses: subosito/flutter-action@v2
              with:
                flutter-version: ${{ env.FLUTTER_VERSION }}
                channel: "stable"
                cache: true
            - name: Project preparation
              run: flutter pub get
            - run: dart run environment_config:generate
            - name: Dart format
              run: dart format -o none --set-exit-if-changed .
            - name: Flutter analyze
              run: flutter analyze
            - name: Flutter test
              run: flutter test --coverage --reporter github

    integration_test:
        name: Integration test (Android emulator)
        needs: static_checks
        runs-on: ubuntu-latest
        timeout-minutes: 30
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-java@v5
              with:
                distribution: temurin
                java-version: "17"
            - name: Flutter install stable version
              uses: subosito/flutter-action@v2
              with:
                flutter-version: ${{ env.FLUTTER_VERSION }}
                channel: "stable"
                cache: true
            - name: Project preparation
              run: flutter pub get
            - run: dart run environment_config:generate
            - name: Enable KVM
              run: |
                echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
                sudo udevadm control --reload-rules
                sudo udevadm trigger --name-match=kvm
            - name: Run integration test on emulator
              uses: reactivecircus/android-emulator-runner@v2
              with:
                api-level: 34
                arch: x86_64
                profile: pixel_6
                script: flutter test integration_test/

    build:
        name: Build Android APK
        needs: integration_test
        runs-on: ubuntu-latest
        timeout-minutes: 20
        steps:
            - uses: actions/checkout@v6
            - uses: actions/setup-java@v5
              with:
                distribution: temurin
                java-version: "17"
            - name: Flutter install stable version
              uses: subosito/flutter-action@v2
              with:
                flutter-version: ${{ env.FLUTTER_VERSION }}
                channel: "stable"
                cache: true
            - name: Project preparation
              run: flutter pub get
            - run: dart run environment_config:generate
            - name: Build application for android
              run: flutter build apk --release
            - uses: actions/upload-artifact@v7
              with:
                  name: app-release
                  path: build/app/outputs/flutter-apk/app-release.apk
